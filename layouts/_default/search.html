{{ define "main" }}
      <h1 class="title">{{ .Title }}</h1>

    {{ with .Content }}
    <section class="body search-intro">
      {{ . }}
    </section>
    {{ end }}

    <section
      class="search-panel"
      data-search-root
      {{ with .OutputFormats.Get "json" }}data-search-index-url="{{ .RelPermalink }}"{{ end }}>
      <label class="search-label" for="search-query">🔍</label>
      <input
        id="search-query"
        class="search-input"
        data-search-input
        type="search"
        name="q"
        autocomplete="off"
        spellcheck="false"
        aria-controls="search-results"
        aria-describedby="search-help search-status"
        placeholder="根据标题、标签或者内容搜索..." />
      <p id="search-help" class="search-hint">
        按 <kbd>/</kbd> 快速聚焦搜索框。
      </p>
      <p id="search-status" class="search-status" data-search-status aria-live="polite">
        Loading search index...
      </p>
      <ul id="search-results" class="search-results" data-search-results></ul>
    </section>

    <noscript>
      <p class="search-status search-status-error">Search requires JavaScript to load the index and filter results.</p>
    </noscript>
<script defer src="{{ absURL "js/search.js" }}"></script>
{{ end }}
